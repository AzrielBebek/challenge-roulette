<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challenge List Randomizer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #ff6b35;
    --accent2: #ffb347;
    --gold: #ffd700;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --main-glow: rgba(255, 107, 53, 0.15);
    --legacy-color: #7c70c4;
    --removed-color: #c45555;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,107,53,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,53,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .site-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 88px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: var(--text);
    text-shadow: 0 0 80px rgba(255,107,53,0.3);
  }

  h1 span {
    color: var(--accent);
    display: block;
  }

  .subtitle {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
  }

  /* Filter toggles */
  .filters {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }

  .filter-btn.active[data-type="main"] {
    border-color: var(--accent);
    background: rgba(255,107,53,0.12);
    color: var(--accent);
  }
  .filter-btn.active[data-type="legacy"] {
    border-color: var(--legacy-color);
    background: rgba(124,112,196,0.12);
    color: var(--legacy-color);
  }
  .filter-btn.active[data-type="removed"] {
    border-color: var(--removed-color);
    background: rgba(196,85,85,0.12);
    color: var(--removed-color);
  }

  /* Roll button */
  .roll-btn {
    display: block;
    width: 100%;
    padding: 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .roll-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }

  .roll-btn:hover::after { transform: translateX(100%); }
  .roll-btn:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 8px 30px rgba(255,107,53,0.4); }
  .roll-btn:active { transform: translateY(1px); }
  .roll-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Result card */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 0;
    display: none;
    overflow: hidden;
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    margin-bottom: 32px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card.visible { display: block; }

  .card-header {
    padding: 6px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-header.type-main { background: rgba(255,107,53,0.15); color: var(--accent); border-bottom: 1px solid rgba(255,107,53,0.2); }
  .card-header.type-legacy { background: rgba(124,112,196,0.15); color: var(--legacy-color); border-bottom: 1px solid rgba(124,112,196,0.2); }
  .card-header.type-removed { background: rgba(196,85,85,0.15); color: var(--removed-color); border-bottom: 1px solid rgba(196,85,85,0.2); }

  .card-body {
    padding: 28px 28px 24px;
  }

  .rank-badge {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .level-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 7vw, 56px);
    line-height: 1;
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 6px;
    word-break: break-word;
  }

  .level-author {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .level-author strong {
    color: var(--text);
    font-weight: 500;
  }

  .card-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .action-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.15s;
  }

  .action-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,107,53,0.08);
  }

  /* History */
  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .history-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--removed-color); }

  #history-list { display: flex; flex-direction: column; gap: 2px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: var(--surface);
    border-left: 2px solid transparent;
    font-size: 14px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .history-item.type-main { border-color: rgba(255,107,53,0.4); }
  .history-item.type-legacy { border-color: rgba(124,112,196,0.4); }
  .history-item.type-removed { border-color: rgba(196,85,85,0.4); }

  .history-rank {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 36px;
  }

  .history-name {
    flex: 1;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-author {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  /* empty state */
  #history-section { display: none; }

  /* Stats bar */
  .stats-row {
    display: flex;
    gap: 2px;
    margin-bottom: 32px;
  }

  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Shuffle animation */
  @keyframes shuffle {
    0%,100% { transform: translateY(0); }
    25% { transform: translateY(-4px); }
    75% { transform: translateY(4px); }
  }

  .roll-btn.rolling { animation: shuffle 0.1s ease infinite; }
</style>
</head>

  <div id="history-section">

let history = [];
let rolled = 0;
let seenIds = new Set();
let activeFilters = new Set(['main','legacy','removed']);

// Filter toggles
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.type;
    if (activeFilters.has(t)) {
      if (activeFilters.size === 1) return; // keep at least one
      activeFilters.delete(t);
      btn.classList.remove('active');
    } else {
      activeFilters.add(t);
      btn.classList.add('active');
    }
    updatePoolCount();
  });
});

function getPool() {
  return ALL_CHALLENGES.filter(c => activeFilters.has(c[3]));
}

function updatePoolCount() {
  document.getElementById('stat-pool').textContent = getPool().length;
}

const TYPE_LABELS = { main: '⚡ Main List', legacy: '☁ Legacy', removed: '✕ Removed' };
const TYPE_RANK_PREFIX = { main: '#', legacy: 'Legacy #', removed: 'Removed #' };

function roll() {
  const pool = getPool();
  if (!pool.length) return;

  const btn = document.getElementById('roll-btn');
  btn.classList.add('rolling');
  btn.disabled = true;

  setTimeout(() => {
    btn.classList.remove('rolling');
    btn.disabled = false;

    const c = pool[Math.floor(Math.random() * pool.length)];
    const [rank, name, author, type] = c;

    // Update card
    const header = document.getElementById('card-header');
    header.className = 'card-header type-' + type;
    header.innerHTML = `<span>${TYPE_LABELS[type]}</span><span style="font-size:10px;opacity:0.6">${rank} of 408</span>`;

    document.getElementById('lv-rank').textContent = TYPE_RANK_PREFIX[type] + rank;
    document.getElementById('lv-name').textContent = name;
    document.getElementById('lv-author').textContent = author;
    document.getElementById('lv-link').href = `https://challengelist.gd/challenges/${rank}`;

    const card = document.getElementById('result-card');
    card.classList.remove('visible');
    void card.offsetWidth;
    card.classList.add('visible');

    // Stats
    rolled++;
    seenIds.add(rank);
    document.getElementById('stat-rolled').textContent = rolled;
    document.getElementById('stat-unique').textContent = seenIds.size;
    document.getElementById('stat-pool').textContent = pool.length;
    document.getElementById('stats-row').style.display = 'flex';

    // History
    addHistory(rank, name, author, type);
  }, 120);
}

function addHistory(rank, name, author, type) {
  history.unshift({ rank, name, author, type });
  const list = document.getElementById('history-list');
  const item = document.createElement('div');
  item.className = `history-item type-${type}`;
  item.innerHTML = `
    <span class="history-rank">${rank}</span>
    <span class="history-name">${name}</span>
    <span class="history-author">${author}</span>
  `;
  list.insertBefore(item, list.firstChild);
  document.getElementById('history-section').style.display = 'block';
}

function clearHistory() {
  history = [];
  rolled = 0;
  seenIds.clear();
  document.getElementById('history-list').innerHTML = '';
  document.getElementById('history-section').style.display = 'none';
  document.getElementById('stats-row').style.display = 'none';
  document.getElementById('result-card').classList.remove('visible');
}

// Init pool count on load
updatePoolCount();
</script>
